<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- Credit Card icon (top center) - same style as payment-methods.svg -->
  <g transform="translate(3, 0)">
    <rect x="0" y="0" width="18" height="11" rx="1.8" ry="1.8" fill="#1565C0"/>
    <!-- EMV chip -->
    <rect x="2" y="3.5" width="4.5" height="3.2" rx="0.7" ry="0.7" fill="#D4AF37" stroke="#B8960C" stroke-width="0.18"/>
    <line x1="2" y1="4.6" x2="6.5" y2="4.6" stroke="#B8960C" stroke-width="0.13"/>
    <line x1="2" y1="5.6" x2="6.5" y2="5.6" stroke="#B8960C" stroke-width="0.13"/>
    <line x1="4.2" y1="3.5" x2="4.2" y2="6.7" stroke="#B8960C" stroke-width="0.13"/>
    <!-- Card number dots -->
