<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Signing in...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: #f5f5f5;
      color: #333;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #ddd;
      border-top-color: #4285f4;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    p { font-size: 16px; }
    .fallback { margin-top: 1rem; font-size: 14px; color: #666; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner"></div>
    <p>Signing you in...</p>
    <p class="fallback" id="fallback">
      If the app doesn't open automatically,
      <a href="#" id="manual-link">tap here</a>.
    </p>
  </div>
  <script>
    // Extract query parameters from Google's OAuth redirect
    var params = new URLSearchParams(window.location.search);
    var code = params.get('code');
    var error = params.get('error');

    if (code) {
      // Redirect to the app via custom URL scheme
      var appUrl = 'gcashmall://oauth?code=' + encodeURIComponent(code);
      window.location.href = appUrl;

      // Show fallback link after a delay in case the redirect doesn't work
      var fallbackEl = document.getElementById('fallback');
      var manualLink = document.getElementById('manual-link');
      manualLink.href = appUrl;
      setTimeout(function() {
        fallbackEl.style.display = 'block';
      }, 2000);
    } else if (error) {
      document.querySelector('.spinner').style.display = 'none';
      document.querySelector('p').textContent = 'Sign in was cancelled or failed. You can close this tab.';
    } else {
      document.querySelector('.spinner').style.display = 'none';
      document.querySelector('p').textContent = 'Invalid request. You can close this tab.';
    }
  </script>
</body>
</html>
