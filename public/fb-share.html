<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sharing to Facebook…</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        color: #444;
      }
    </style>
    <script>
      // This page exists so the native app can share to Facebook in Safari.
      // Opening facebook.com directly via the OS would be hijacked by the
      // Facebook app (which ignores sharer.php). Opening THIS page on our own
      // domain in Safari, then JS-redirecting to sharer.php, keeps Facebook in
      // the browser — JavaScript redirects do not trigger iOS universal links.
      ;(function () {
        var u = new URLSearchParams(window.location.search).get('u') || ''
        var target =
          'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(u)
        window.location.replace(target)
      })()
    </script>
  </head>
  <body>
    <p>
      Redirecting to Facebook…
      <a id="fallback" href="https://www.facebook.com/">tap here</a> if nothing
      happens.
    </p>
    <script>
      var u = new URLSearchParams(window.location.search).get('u') || ''
      document.getElementById('fallback').href =
        'https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(u)
    </script>
  </body>
</html>
