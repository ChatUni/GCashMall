[build]
  functions = "netlify/functions"
  publish = "dist"

[dev]
  port = 8888
  framework = "#custom"
  command = "npm run dev:vite"
  targetPort = 5173

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback - must come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200