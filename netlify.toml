[build]
  functions = "netlify/functions"
  publish = "www"
  edge_functions = "netlify/edge-functions"

[functions]
  # glin-profanity is a dual ESM/CJS package; the tracer only ships the import
  # entry, but the runtime resolves the require entry (index.cjs). Force-include
  # the whole package so both resolve.
  included_files = ["node_modules/glin-profanity/**"]

[dev]
  port = 8888
  framework = "#custom"
  command = "npm run dev:vite"
  targetPort = 5173

# Edge function for injecting OG meta tags on player pages (social bots only)
[[edge_functions]]
  function = "og-meta"
  path = "/player/*"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# SPA fallback - must come last
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200